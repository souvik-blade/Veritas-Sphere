services:
  mongodb:
    image: mongo:7
    container_name: veritas-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: veritas-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MONGO_URL: mongodb://mongodb:27017
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
    container_name: veritas-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      REACT_APP_BACKEND_URL: http://localhost:8000
      WDS_SOCKET_PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mongodb_data:
